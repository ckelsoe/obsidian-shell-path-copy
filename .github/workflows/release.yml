name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  PLUGIN_NAME: shell-path-copy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: VirusTotal scan of release artifacts
        # Skipped for pre-release tags: rapid beta builds resubmit byte-identical
        # files, which VirusTotal rejects with HTTP 409. Stable releases scan.
        if: ${{ !contains(github.ref, '-beta') && !contains(github.ref, '-rc') && !contains(github.ref, '-alpha') }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            main.js
            manifest.json
            styles.css

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          echo "Extracted release notes:"
          cat release-notes.md

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Mark pre-release tags (-beta/-rc/-alpha) so Obsidian's marketplace
          # updater and stable BRAT installs do not pick them up as the latest.
          prerelease=""
          case "$tag" in
            *-beta*|*-rc*|*-alpha*) prerelease="--prerelease" ;;
          esac
          if [ -s release-notes.md ]; then
            gh release create "$tag" $prerelease \
              --title="$tag" \
              --notes-file release-notes.md \
              main.js manifest.json styles.css
          else
            gh release create "$tag" $prerelease \
              --title="$tag" \
              --generate-notes \
              main.js manifest.json styles.css
          fi

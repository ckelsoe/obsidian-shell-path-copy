name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  PLUGIN_NAME: shell-path-copy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { in_section=1; next }
            in_section && /^## \[/ { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md
          echo "Extracted release notes:"
          cat release-notes.md

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Mark pre-release tags (-beta/-rc/-alpha) so Obsidian's marketplace
          # updater and stable BRAT installs do not pick them up as the latest.
          prerelease=""
          case "$tag" in
            *-beta*|*-rc*|*-alpha*) prerelease="--prerelease" ;;
          esac
          if [ -s release-notes.md ]; then
            gh release create "$tag" $prerelease \
              --title="$tag" \
              --notes-file release-notes.md \
              main.js manifest.json styles.css
          else
            gh release create "$tag" $prerelease \
              --title="$tag" \
              --generate-notes \
              main.js manifest.json styles.css
          fi

      - name: VirusTotal scan of release artifacts
        id: virustotal
        # Best-effort: VirusTotal returns HTTP 409 ("resource already exists")
        # when a byte-identical artifact was scanned before, and the action
        # treats that as fatal. continue-on-error keeps a 409 (or any
        # VirusTotal hiccup) from blocking the release; the scan still runs
        # and reports. The action's own update_release_body input is not used
        # because it only fires on `release`-event-triggered workflows; we
        # trigger on `push: tags`, so the next step appends the links itself.
        continue-on-error: true
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            main.js
            manifest.json
            styles.css

      - name: Append VirusTotal links to release body
        # Parses the VirusTotal action's `analysis` output (format:
        # name1=url1,name2=url2,...) into a markdown list and appends it to
        # the release body via `gh release edit`. Skipped if the VirusTotal
        # step produced no analysis output (continue-on-error above could
        # leave it empty on total failure).
        if: steps.virustotal.outputs.analysis != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VT_ANALYSIS: ${{ steps.virustotal.outputs.analysis }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          {
            echo
            echo "### VirusTotal scan"
            echo
            IFS=','
            for entry in $VT_ANALYSIS; do
              name="${entry%%=*}"
              url="${entry#*=}"
              echo "- [\`$name\`]($url)"
            done
          } > vt-section.md
          gh release view "$tag" --json body --jq .body > current-body.md
          cat current-body.md vt-section.md > new-body.md
          gh release edit "$tag" --notes-file new-body.md
